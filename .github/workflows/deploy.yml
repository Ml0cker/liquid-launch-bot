name: Deploy Liquid Launch Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          LIQUID_FACTORY_ADDRESS: ${{ secrets.LIQUID_FACTORY_ADDRESS }}
          START_BLOCK: ${{ secrets.START_BLOCK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IPFS_GATEWAY: ${{ secrets.IPFS_GATEWAY }}
          POLL_INTERVAL: ${{ secrets.POLL_INTERVAL }}
        run: |
          echo "Testing SSH connection..."
          sshpass -p "$SERVER_PASSWORD" ssh -v -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null $SERVER_USER@$SERVER_HOST "echo 'SSH connection successful'" || exit 1

          cat > /tmp/deploy.sh << 'SCRIPTEOF'
          #!/bin/bash
          set -e
          mkdir -p /app/liquid-launch-bot
          cd /app/liquid-launch-bot
          if [ -d .git ]; then
            git pull origin main
          else
            git clone https://github.com/Ml0cker/liquid-launch-bot.git .
          fi
          cat > .env << ENVEOF
          BASE_RPC_URL=$BASE_RPC_URL
          LIQUID_FACTORY_ADDRESS=$LIQUID_FACTORY_ADDRESS
          START_BLOCK=$START_BLOCK
          TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
          TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID
          IPFS_GATEWAY=$IPFS_GATEWAY
          POLL_INTERVAL=$POLL_INTERVAL
          ENVEOF
          docker-compose down 2>/dev/null || true
          docker-compose up -d --build
          sleep 5
          docker-compose logs bot | tail -20
          SCRIPTEOF
          chmod +x /tmp/deploy.sh
          echo "Transferring script..."
          sshpass -p "$SERVER_PASSWORD" scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null /tmp/deploy.sh $SERVER_USER@$SERVER_HOST:/tmp/deploy.sh || exit 1
          echo "Executing script..."
          sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null $SERVER_USER@$SERVER_HOST /tmp/deploy.sh || exit 1

      - name: Notify success
        if: success()
        run: echo "âś… Bot deployed successfully"

      - name: Notify failure
        if: failure()
        run: echo "âťŚ Deployment failed"





