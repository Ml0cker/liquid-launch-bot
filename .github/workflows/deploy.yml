name: Deploy Liquid Launch Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            cd /app/liquid-launch-bot || mkdir -p /app/liquid-launch-bot && cd /app/liquid-launch-bot
            [ -d .git ] && git pull origin main || git clone https://github.com/Ml0cker/liquid-launch-bot.git .
            cat > .env << 'EOF'
            BASE_RPC_URL=${{ secrets.BASE_RPC_URL }}
            LIQUID_FACTORY_ADDRESS=${{ secrets.LIQUID_FACTORY_ADDRESS }}
            START_BLOCK=${{ secrets.START_BLOCK }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            IPFS_GATEWAY=${{ secrets.IPFS_GATEWAY }}
            POLL_INTERVAL=${{ secrets.POLL_INTERVAL }}
            EOF
            docker-compose down 2>/dev/null || true
            docker-compose up -d --build
            sleep 5
            docker-compose logs bot | tail -20








