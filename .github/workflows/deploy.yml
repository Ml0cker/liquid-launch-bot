name: Deploy Liquid Launch Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            mkdir -p /app/liquid-launch-bot
            cd /app/liquid-launch-bot

            if [ -d .git ]; then
              git pull origin main
            else
              git clone https://github.com/Ml0cker/liquid-launch-bot.git .
            fi

            cat > .env << 'EOF'
            BASE_RPC_URL=${{ secrets.BASE_RPC_URL }}
            LIQUID_FACTORY_ADDRESS=${{ secrets.LIQUID_FACTORY_ADDRESS }}
            START_BLOCK=${{ secrets.START_BLOCK }}
            TELEGRAM_BOT_TOKEN=${{ secrets.TELEGRAM_BOT_TOKEN }}
            TELEGRAM_CHAT_ID=${{ secrets.TELEGRAM_CHAT_ID }}
            IPFS_GATEWAY=${{ secrets.IPFS_GATEWAY }}
            POLL_INTERVAL=${{ secrets.POLL_INTERVAL }}
            EOF

            docker-compose down 2>/dev/null || true
            docker-compose up -d --build
            sleep 5
            docker-compose logs bot | tail -20

      - name: Notify success
        if: success()
        run: echo "✅ Bot deployed successfully"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed"




