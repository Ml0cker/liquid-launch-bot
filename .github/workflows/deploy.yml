name: Deploy Liquid Launch Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass openssh-client

      - name: Test server connectivity
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          echo "Testing connectivity to $SERVER_USER@$SERVER_HOST..."
          timeout 10 bash -c "exec 3<>/dev/tcp/$SERVER_HOST/22; cat <&3" 2>&1 | head -1 || echo "Connection test completed"

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          LIQUID_FACTORY_ADDRESS: ${{ secrets.LIQUID_FACTORY_ADDRESS }}
          START_BLOCK: ${{ secrets.START_BLOCK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IPFS_GATEWAY: ${{ secrets.IPFS_GATEWAY }}
          POLL_INTERVAL: ${{ secrets.POLL_INTERVAL }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          # Create deployment script
          cat > /tmp/deploy.sh << 'DEPLOYEOF'
          #!/bin/bash
          set -e
          mkdir -p /app/liquid-launch-bot
          cd /app/liquid-launch-bot

          if [ -d .git ]; then
            git pull origin main
          else
            git clone https://github.com/Ml0cker/liquid-launch-bot.git .
          fi

          cat > .env << ENVEOF
          BASE_RPC_URL=$BASE_RPC_URL
          LIQUID_FACTORY_ADDRESS=$LIQUID_FACTORY_ADDRESS
          START_BLOCK=$START_BLOCK
          TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
          TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID
          IPFS_GATEWAY=$IPFS_GATEWAY
          POLL_INTERVAL=$POLL_INTERVAL
          ENVEOF

          docker-compose down 2>/dev/null || true
          docker-compose up -d --build
          sleep 5
          docker-compose logs bot | tail -20
          DEPLOYEOF

          chmod +x /tmp/deploy.sh

          # Execute deployment
          export SSHPASS="$SERVER_PASSWORD"
          sshpass -e ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null $SERVER_USER@$SERVER_HOST 'bash -s' < /tmp/deploy.sh

      - name: Notify success
        if: success()
        run: echo "✅ Bot deployed successfully"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed"







