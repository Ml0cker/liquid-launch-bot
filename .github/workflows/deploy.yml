name: Deploy Liquid Launch Bot

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install sshpass
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

      - name: Generate SSH key
        run: |
          ssh-keygen -t rsa -b 4096 -f ~/.ssh/id_rsa -N "" -C "github-actions"
          cat ~/.ssh/id_rsa.pub

      - name: Add SSH key to server
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_PASSWORD: ${{ secrets.SERVER_PASSWORD }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          # Try to add SSH key using expect-like approach
          (
            sleep 1
            echo "$SERVER_PASSWORD"
            sleep 1
            echo "mkdir -p ~/.ssh && cat >> ~/.ssh/authorized_keys"
            sleep 1
            cat ~/.ssh/id_rsa.pub
            sleep 1
            echo ""
            sleep 1
          ) | sshpass -p "$SERVER_PASSWORD" ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST 2>&1 | head -20 || true

      - name: Deploy via SSH
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          BASE_RPC_URL: ${{ secrets.BASE_RPC_URL }}
          LIQUID_FACTORY_ADDRESS: ${{ secrets.LIQUID_FACTORY_ADDRESS }}
          START_BLOCK: ${{ secrets.START_BLOCK }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          IPFS_GATEWAY: ${{ secrets.IPFS_GATEWAY }}
          POLL_INTERVAL: ${{ secrets.POLL_INTERVAL }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H $SERVER_HOST >> ~/.ssh/known_hosts 2>/dev/null || true

          ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << 'EOFSCRIPT'
          set -e
          mkdir -p /app/liquid-launch-bot
          cd /app/liquid-launch-bot

          if [ -d .git ]; then
            git pull origin main
          else
            git clone https://github.com/Ml0cker/liquid-launch-bot.git .
          fi

          cat > .env << EOFENV
          BASE_RPC_URL=$BASE_RPC_URL
          LIQUID_FACTORY_ADDRESS=$LIQUID_FACTORY_ADDRESS
          START_BLOCK=$START_BLOCK
          TELEGRAM_BOT_TOKEN=$TELEGRAM_BOT_TOKEN
          TELEGRAM_CHAT_ID=$TELEGRAM_CHAT_ID
          IPFS_GATEWAY=$IPFS_GATEWAY
          POLL_INTERVAL=$POLL_INTERVAL
          EOFENV

          docker-compose down 2>/dev/null || true
          docker-compose up -d --build
          sleep 5
          docker-compose logs bot | tail -20
          EOFSCRIPT

      - name: Notify success
        if: success()
        run: echo "✅ Bot deployed successfully"

      - name: Notify failure
        if: failure()
        run: echo "❌ Deployment failed"






